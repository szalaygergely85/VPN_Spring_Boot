name: CI/CD for VPN Server

on:
  push:
    branches:
      - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Give executable permissions to gradlew
        run: chmod +x ./gradlew

      - name: Build the project
        run: ./gradlew clean build -x test

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker buildx create --use
          docker buildx build --no-cache --platform linux/amd64,linux/arm64 -t gery12492/vpn-server:latest --push .

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          printf "%s" "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      - name: Create app secrets
        run: |
          kubectl create secret generic vpn-server-secret \
            --from-literal=DB_USER=${{ secrets.DB_USER }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create SSH key secret
        run: |
          printf '%s' "${{ secrets.WG_SSH_KEY }}" > vpn_server_key
          chmod 400 vpn_server_key
          kubectl create secret generic vpn-server-ssh-key \
            --from-file=vpn_server_key \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to k3s
        run: |
          kubectl apply -f k8s/ -n default
          kubectl set image deployment/vpn-server vpn-server=gery12492/vpn-server:latest -n default
          kubectl rollout restart deployment/vpn-server -n default
          kubectl rollout status deployment/vpn-server -n default
