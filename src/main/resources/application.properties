spring.application.name=VPN_Spring_Boot

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/vpnserver?useUnicode=yes&characterEncoding=UTF-8}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Encryption
app.encryption.key=${ENCRYPTION_KEY}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:30}

# WireGuard server
wireguard.server.host=${WG_SERVER_HOST:138.199.201.149}
wireguard.server.port=${WG_SERVER_PORT:51820}
wireguard.server.public-key=${WG_SERVER_PUBLIC_KEY:LpiM47fL1nTCF7n5Cxd6VgaMlQoYOQekNHSJxs0BsQI=}
wireguard.server.dns=${WG_DNS:1.1.1.1}
wireguard.server.allowed-ips=${WG_ALLOWED_IPS:0.0.0.0/0}
wireguard.server.persistent-keepalive=${WG_KEEPALIVE:25}

# VPN client IP pool
wireguard.vpn.subnet=${VPN_SUBNET:10.8.0.}
wireguard.vpn.cidr=${VPN_CIDR:/24}

server.port=${SERVER_PORT:8080}

# SSH peer management
wireguard.ssh.host=${WG_SSH_HOST:138.199.201.149}
wireguard.ssh.port=${WG_SSH_PORT:22}
wireguard.ssh.user=${WG_SSH_USER:gege}
wireguard.ssh.key-path=${WG_SSH_KEY_PATH:vpn_server_key}
wireguard.ssh.interface=${WG_SSH_INTERFACE:wg0}
wireguard.ssh.wg-bin=${WG_BIN:/usr/bin/wg}
