spring.application.name=VPN_Spring_Boot

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/vpnserver?useUnicode=yes&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — auto-creates/updates tables on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT — replace secret in production (min 256-bit / 32 chars)
jwt.secret=VPN_SECRET_CHANGE_IN_PRODUCTION_MIN_32_CHARS_HERE!!
jwt.expiration-ms=86400000

# WireGuard server — returned to clients on register/login
wireguard.server.host=138.199.201.149
wireguard.server.port=51820
wireguard.server.public-key=LpiM47fL1nTCF7n5Cxd6VgaMlQoYOQekNHSJxs0BsQI=
wireguard.server.dns=1.1.1.1
wireguard.server.allowed-ips=0.0.0.0/0
wireguard.server.persistent-keepalive=25

# VPN client IP pool — /24 subnet, clients get 10.8.0.2 onwards
wireguard.vpn.subnet=10.8.0.
wireguard.vpn.cidr=/24

server.port=8080

# SSH access to WireGuard server for peer management
wireguard.ssh.host=138.199.201.149
wireguard.ssh.port=22
wireguard.ssh.user=gege
wireguard.ssh.key-path=vpn_server_key
wireguard.ssh.interface=wg0
wireguard.ssh.wg-bin=/usr/bin/wg
